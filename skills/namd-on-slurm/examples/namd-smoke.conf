# Minimal NAMD configuration template for launch planning.
# Replace coordinates/structure/parameters with a small public test system
# before setting RUN_NAMD=1.

structure              <system>.psf
coordinates            <system>.pdb
parameters             <parameters>.prm

set output_root        namd-output/namd-smoke
outputName             $output_root
restartname            namd-output/restart/namd-smoke
restartfreq            100

timestep               2.0
numsteps               100
temperature            300
exclude                scaled1-4
1-4scaling             1.0
switching              on
switchdist             10
cutoff                 12
pairlistdist           14

# Keep output small for smoke tests.
outputEnergies         10
outputTiming           10
dcdFreq                0
