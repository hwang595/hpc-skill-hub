name: Publish Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "collections/**"
      - "docs/**"
      - "registry/index.json"
      - "skills/**"
      - "site-adapters/**"
      - "tools/build_site.py"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/configure-pages@v5
      - name: Build static registry site
        run: python3 tools/build_site.py --output site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
