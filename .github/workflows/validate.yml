name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate skill registry
        run: python3 tools/validate_skills.py
      - name: Check generated registry index
        run: python3 tools/build_index.py --check
      - name: Check generated registry health
        run: python3 tools/build_health.py --check
      - name: Check generated compatibility tables
        run: python3 tools/build_compatibility.py --check
      - name: Check generated agent adapters
        run: python3 tools/build_agent_adapters.py --check
      - name: Check skill benchmarks
        run: python3 tools/run_benchmarks.py --check
      - name: Check agent benchmark plan and results
        run: |
          python3 tools/agent_benchmark_harness.py --check
          python3 tools/agent_benchmark_harness.py --plan agent-bench/plans/smoke-v0.3.json --report docs/AGENT_BENCHMARK_SMOKE_PLAN.md --check
          python3 tools/run_agent_benchmarks.py --check
      - name: Check packaged registry data
        run: python3 tools/build_package_data.py --check
      - name: Check immutable release snapshots
        run: python3 tools/validate_registry_artifacts.py --release-only
      - name: Check reviewed-skill pilot packet
        run: python3 tools/review_packet.py --check
      - name: Validate generated artifact contracts
        run: python3 tools/validate_registry_artifacts.py
      - name: Run safety audit
        run: python3 tools/audit_safety.py
      - name: Scan community skill packages
        run: python3 tools/scan_skill_security.py skills --fail-on high
      - name: Run test suite
        run: python3 -m unittest discover -s tests
      - name: Install CLI package
        run: python3 -m pip install .
      - name: Smoke test installed package outside checkout
        run: |
          cd /tmp
          hpc-skill health --json
          hpc-skill collection core-hpc --json
          python3 -m hpc_skill_hub show slurm-submit-job --json
      - name: Smoke test registry CLI
        run: |
          python3 tools/hpc_skill.py list
          hpc-skill collections
          hpc-skill collection core-hpc
          hpc-skill health
          python3 tools/review_packet.py --json --limit 5
          hpc-skill validate --skill slurm-submit-job
          python3 tools/hpc_skill.py search slurm
          python3 tools/hpc_skill.py show slurm-submit-job --examples
          python3 tools/hpc_skill.py collections
          python3 tools/hpc_skill.py collection core-hpc
          python3 tools/hpc_skill.py adapters
          hpc-skill security skills/slurm-submit-job --fail-on high
          python3 tools/hpc_skill.py scaffold skill ci-test-skill --name "CI Test Skill" --category education --tool bash --root /tmp/hpc-skill-hub-scaffold --force
          python3 tools/hpc_skill.py scaffold site-adapter ci-test-cluster --name "CI Test Cluster" --root /tmp/hpc-skill-hub-scaffold --force
          test -f /tmp/hpc-skill-hub-scaffold/skills/ci-test-skill/skill.json
          test -f /tmp/hpc-skill-hub-scaffold/site-adapters/ci-test-cluster/site.json
      - name: Build static site
        run: python3 tools/build_site.py --output /tmp/hpc-skill-hub-site/index.html
