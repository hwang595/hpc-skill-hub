name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill registry
        run: python3 tools/validate_skills.py
