name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill registry
        run: python3 tools/validate_skills.py
      - name: Check generated registry index
        run: python3 tools/build_index.py --check
      - name: Check generated registry health
        run: python3 tools/build_health.py --check
      - name: Run safety audit
        run: python3 tools/audit_safety.py
      - name: Run test suite
        run: python3 -m unittest discover -s tests
      - name: Install CLI package
        run: python3 -m pip install .
      - name: Smoke test registry CLI
        run: |
          python3 tools/hpc_skill.py list
          hpc-skill collections
          hpc-skill collection core-hpc
          hpc-skill health
          hpc-skill validate --skill slurm-submit-job
          python3 tools/hpc_skill.py search slurm
          python3 tools/hpc_skill.py show slurm-submit-job --examples
          python3 tools/hpc_skill.py collections
          python3 tools/hpc_skill.py collection core-hpc
          python3 tools/hpc_skill.py adapters
          python3 tools/hpc_skill.py scaffold skill ci-test-skill --name "CI Test Skill" --category education --tool bash --root /tmp/hpc-skill-hub-scaffold --force
          python3 tools/hpc_skill.py scaffold site-adapter ci-test-cluster --name "CI Test Cluster" --root /tmp/hpc-skill-hub-scaffold --force
          test -f /tmp/hpc-skill-hub-scaffold/skills/ci-test-skill/skill.json
          test -f /tmp/hpc-skill-hub-scaffold/site-adapters/ci-test-cluster/site.json
      - name: Build static site
        run: python3 tools/build_site.py --output /tmp/hpc-skill-hub-site/index.html
