name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill registry
        run: python3 tools/validate_skills.py
      - name: Check generated registry index
        run: python3 tools/build_index.py --check
      - name: Smoke test registry CLI
        run: |
          python3 tools/hpc_skill.py list
          python3 tools/hpc_skill.py search slurm
          python3 tools/hpc_skill.py show slurm-submit-job --examples
          python3 tools/hpc_skill.py adapters
