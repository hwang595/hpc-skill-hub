name: Package

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package build tooling
        run: python3 -m pip install --upgrade pip build twine
      - name: Check packaged registry data
        run: |
          python3 tools/build_skill_context.py --check
          python3 tools/build_mcp_client_configs.py --check
          python3 tools/build_release_status.py --check
          python3 tools/build_package_data.py --check
          python3 tools/build_release_manifest.py v0.5.0 --check
          python3 tools/validate_registry_artifacts.py
      - name: Build distributions
        run: python3 -m build --sdist --wheel
      - name: Check distribution metadata
        run: python3 -m twine check dist/*
      - name: Smoke test wheel outside checkout
        run: |
          python3 -m venv /tmp/hpc-skill-hub-wheel
          /tmp/hpc-skill-hub-wheel/bin/python -m pip install --no-index --find-links "${GITHUB_WORKSPACE}/dist" hpc-skill-hub
          cd /tmp
          /tmp/hpc-skill-hub-wheel/bin/hpc-skill health --json
          /tmp/hpc-skill-hub-wheel/bin/hpc-skill doctor --json
          /tmp/hpc-skill-hub-wheel/bin/hpc-skill collection core-hpc --json
          /tmp/hpc-skill-hub-wheel/bin/hpc-skill resolve slurm-submit-job --adapter example-campus-cluster --json
          /tmp/hpc-skill-hub-wheel/bin/hpc-skill-mcp --help
          /tmp/hpc-skill-hub-wheel/bin/python -m hpc_skill_hub show slurm-submit-job --json
          /tmp/hpc-skill-hub-wheel/bin/python -c "from hpc_skill_hub.context import find_skill_context, load_context_bundle; b = load_context_bundle(); s = find_skill_context(b, 'slurm-submit-job'); assert s and any(f['role'] == 'readme' and f['content'] for f in s['files'])"
          /tmp/hpc-skill-hub-wheel/bin/python -c "from hpc_skill_hub.release_status import load_release_status; s = load_release_status(); assert s['repository_capability_ready'] and not s['external_evidence_ready']"
          /tmp/hpc-skill-hub-wheel/bin/python -c "import importlib.metadata, hpc_skill_hub; assert hpc_skill_hub.__version__ == importlib.metadata.version('hpc-skill-hub')"
      - name: Smoke test wheel with MCP extra outside checkout
        run: |
          python3 -m venv /tmp/hpc-skill-hub-wheel-mcp
          /tmp/hpc-skill-hub-wheel-mcp/bin/python -m pip install --upgrade pip
          wheel_path="$(python3 -c "from pathlib import Path; print(next(Path('dist').glob('*.whl')).resolve())")"
          /tmp/hpc-skill-hub-wheel-mcp/bin/python -m pip install "${wheel_path}[mcp]"
          cd /tmp
          /tmp/hpc-skill-hub-wheel-mcp/bin/hpc-skill doctor --require-mcp --json
      - name: Upload tested distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  attest:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - name: Download tested distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/
      - name: Attest tagged release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*
            registry/releases/${{ github.ref_name }}.json
